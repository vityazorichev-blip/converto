<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Свадебное приглашение — Виктор и Софья</title>
  <meta name="description" content="Электронное приглашение на свадьбу Виктора и Софьи"/>

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Музыка -->
  <audio id="bgAudio" preload="auto" src="1_klass_-_Sukiny_deti_(Zvyki.com).mp3" loop></audio>

  <!-- Оверлей: две прямоугольные фотографии, стык по центру, печать поверх -->
  <section class="envelope-overlay" id="envelopeOverlay" aria-label="Открыть приглашение">
    <!-- Узкие боковые “просветы” второй страницы -->
    <div class="peek2 peek2-left"></div>
    <div class="peek2 peek2-right"></div>

    <!-- Верхнее и нижнее прямоугольные изображения -->
    <div class="rect-cover rect-top">
      <img src="https://sun9-31.userapi.com/s/v1/ig2/s-hN9Rm7Ex01URiAO6RYWicdSXokoHVmq-IuRjay6H0oVXkIn11TxBEtTwn5JzWUhNgGWyuVzG1nL6UxlsJ3hllT.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x269,540x303,640x359,720x404,1080x606,1200x673&from=bu&cs=1200x0" alt="Верхнее фото">
    </div>
    <div class="rect-cover rect-bottom">
      <img src="https://sun9-31.userapi.com/s/v1/ig2/s-hN9Rm7Ex01URiAO6RYWicdSXokoHVmq-IuRjay6H0oVXkIn11TxBEtTwn5JzWUhNgGWyuVzG1nL6UxlsJ3hllT.jpg?quality=95&as=32x18,48x27,72x40,108x61,160x90,240x135,360x202,480x269,540x303,640x359,720x404,1080x606,1200x673&from=bu&cs=1200x0" alt="Нижнее фото">
    </div>

    <!-- Текст поверх обложки -->
    <div class="envelope-text top">МЫ ЖЕНИМСЯ!!!</div>
    <div class="envelope-text bottom">нажмите, чтобы открыть приглашение</div>

    <!-- Печать PNG по центру -->
    <button class="seal-img-btn" id="sealImgBtn" aria-label="Открыть">
      <img src="https://psv4.userapi.com/s/v1/d2/hKzHYKfKIea9OQq9lkDLIB9LMvCGqCSaX-UVWqx1oNo75ffVsMQX3J4yFhwv45_XGwp69vRIyWqeKpF7w70-tBS0pqlvIDInXdNBtlGsvof7rbhL2qdSyj-Xlo8SuE3tmWz_W4M85NSW/background-removal-935bf9b4-57e1-45c0-94a7-2bb9e4e86207.png" alt="Печать" width="120" height="120">
    </button>
  </section>

  <!-- Страница 2: Две полароидные фотографии рядом -->
  <section class="page page-polaroids" id="page2" aria-label="Знакомство">
    <div class="polaroids-wrap">
      <div class="polaroid p-left">
        <img src="https://sun9-5.userapi.com/s/v1/ig2/iNPD34pDebcQuBg_efCZ52iR5ZxFdupK1t08t8lZtCQCq3xuf5N9obD23hXsgyFWZwtTn0dgY0VV6PO86AOh6l7N.jpg?quality=95&as=32x43,48x64,72x96,108x144,160x213,240x320,360x480,480x640,540x720,640x853,720x959,1080x1439,1280x1706,1440x1919,1921x2560&from=bu&cs=1921x0" alt="Фото 1">
        <div class="caption">— интересно, кто будет моим мужем, когда я вырасту?</div>
      </div>
      <div class="polaroid p-right">
        <img src="https://sun9-74.userapi.com/s/v1/ig2/aOTB1H7VfgVaj-UpCzZ16XdSoe6gwZcm4yjWQ6VCMbaD7SSIENiqacTbqUiDO_FQNdWtUy1xzBu0EsGjymisFHiE.jpg?quality=95&as=32x43,48x64,72x96,108x144,160x213,240x320,360x480,480x640,540x720,640x853,720x960,1080x1440,1280x1707,1440x1920,1920x2560&from=bu&cs=1920x0" alt="Фото 2">
        <div class="caption">— им буду я</div>
      </div>
    </div>
    <div class="names">Виктор&nbsp;и&nbsp;Софья</div>
    <div class="scroll-indicator">
      <span class="arrow"></span>
    </div>
  </section>

  <!-- Страницы 3–9 — без изменений -->
  <!-- ... ваш остальной HTML точно как прислали ... -->

  <!-- Страница 8 -->
  <section class="page page-countdown" id="page8" aria-label="До свадьбы осталось">
    <div class="count-card reveal-up">
      <h2 class="title-hero">ДО СВАДЬБЫ ОСТАЛОСЬ</h2>
      <div class="count-grid" aria-live="polite">
        <div class="cell"><div class="num" id="cd-days">0</div><div class="lab">дней</div></div>
        <div class="cell"><div class="num" id="cd-hours">0</div><div class="lab">часов</div></div>
        <div class="cell"><div class="num" id="cd-minutes">0</div><div class="lab">минут</div></div>
        <div class="cell"><div class="num" id="cd-seconds">0</div><div class="lab">секунд</div></div>
      </div>
    </div>
  </section>

  <!-- Страница 9 — Финал -->
  <section class="page page-finale" id="page9" aria-label="До скорой встречи">
    <div class="finale-card">
      <div class="final-polaroid">
        <img id="final-polaroid-img" src="https://sun9-59.userapi.com/s/v1/ig2/w4gGlkUIY7G1Ha9zHhFurqMfQnZVh3__EZE_hUWeo-y9Gac91d-fhF5d8djrgEm4IqHDmb03-zhMX7XGw4POHpZC.jpg?quality=95&as=32x43,48x64,72x96,108x144,160x213,240x320,360x480,480x640,540x720,640x853,720x959,902x1202&from=bu&cs=902x0" alt="Наше фото">
        <div class="final-caption">До скорой встречи! ❤️</div>
      </div>
      <div class="with-love">С любовью,</div>
      <div class="final-names">Виктор&nbsp;Софья</div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
